
services:
  nginx:
    image: nginx:alpine

    ports:
      - "8080:80"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      - user_services
      - product_services
      - general_services

  user_services:
    build: ./services/user_service
    expose:
      - "8000"
  
  product_services:
    build: ./services/product_service
    expose:
      - "8000"
  
  general_services:
    build: ./services/general_service
    expose:
      - "8000"